<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1008;font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.swatch{display:flex;flex-direction:column;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);width:130px}
.swatch-block{height:64px}
.swatch-info{background:#191b0d;padding:8px 10px;border-top:1px solid rgba(255,255,255,.06)}
.swatch-name{font-size:11px;font-weight:700;color:#e5e0d0}
.swatch-hex{font-family:'DM Mono',monospace;font-size:10px;color:#707558;margin-top:2px}
.swatch-role{font-size:9px;color:#4c5230;margin-top:1px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#707558;width:100%;margin-bottom:10px}
</style></head><body>
<div class="section-label">Dark "Warm" Theme Palette</div>
<div class="swatch"><div class="swatch-block" style="background:#0f1008"></div><div class="swatch-info"><div class="swatch-name">BG</div><div class="swatch-hex">#0f1008</div><div class="swatch-role">Dark background</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#191b0d"></div><div class="swatch-info"><div class="swatch-name">Surface</div><div class="swatch-hex">#191b0d</div><div class="swatch-role">Card surface</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#212410"></div><div class="swatch-info"><div class="swatch-name">Surface 2</div><div class="swatch-hex">#212410</div><div class="swatch-role">Input / header</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#e05040"></div><div class="swatch-info"><div class="swatch-name">Accent</div><div class="swatch-hex">#e05040</div><div class="swatch-role">Warmer crimson</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#8a9830"></div><div class="swatch-info"><div class="swatch-name">Green</div><div class="swatch-hex">#8a9830</div><div class="swatch-role">Olive green</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#f59e0b"></div><div class="swatch-info"><div class="swatch-name">Yellow</div><div class="swatch-hex">#f59e0b</div><div class="swatch-role">Amber</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#5a1228"></div><div class="swatch-info"><div class="swatch-name">Sidebar</div><div class="swatch-hex">#5a1228</div><div class="swatch-role">Dark sidebar</div></div></div>
<div class="swatch"><div class="swatch-block" style="background:#2e3018"></div><div class="swatch-info"><div class="swatch-name">Border</div><div class="swatch-hex">#2e3018</div><div class="swatch-role">Dark border</div></div></div>
</body></html>
