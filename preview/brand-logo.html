<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:28px;display:flex;align-items:center;justify-content:center;min-height:140px}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.on-white{background:#fff;padding:20px 40px;border-radius:12px;border:1px solid #dad0be;display:flex;align-items:center;justify-content:center}
.on-wine{background:#722F37;padding:20px 40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.on-dark{background:#0f1008;padding:20px 40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
img{height:44px;object-fit:contain;display:block}
.row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
</style></head><body>
<div class="logo-wrap">
  <div class="row">
    <div class="on-white">
      <img src="../assets/logo_cazorla_white.png" alt="Aceitunas Cazorla" onerror="this.outerHTML='<div style=\'font-size:22px;font-weight:800;color:#a7001d\'>Aceitunas<br><span style=\'font-size:28px\'>Cazorla</span></div>'">
    </div>
    <div class="on-wine">
      <img src="../assets/logo_cazorla.png" alt="Aceitunas Cazorla" onerror="this.outerHTML='<div style=\'font-size:22px;font-weight:800;color:#fff\'>Aceitunas<br><span style=\'font-size:28px\'>Cazorla</span></div>'">
    </div>
    <div class="on-dark">
      <img src="../assets/logo_cazorla.png" alt="Aceitunas Cazorla" onerror="this.outerHTML='<div style=\'font-size:22px;font-weight:800;color:#e05040\'>Aceitunas<br><span style=\'font-size:28px\'>Cazorla</span></div>'">
    </div>
  </div>
</div>
</body></html>
