<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.swatch{display:flex;flex-direction:column;gap:0;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.07);width:120px}
.swatch-block{height:72px;display:flex;align-items:flex-end;padding:8px}
.swatch-info{background:#fff;padding:8px 10px}
.swatch-name{font-size:11px;font-weight:700;color:#1a0f09;letter-spacing:.2px}
.swatch-hex{font-family:'DM Mono',monospace;font-size:10px;color:#6e5f4e;margin-top:2px}
.swatch-role{font-size:9px;color:#9e8e78;margin-top:1px}
</style></head><body>
<div class="swatch">
  <div class="swatch-block" style="background:#a7001d"></div>
  <div class="swatch-info"><div class="swatch-name">Accent</div><div class="swatch-hex">#a7001d</div><div class="swatch-role">Brand crimson</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#c8001f"></div>
  <div class="swatch-info"><div class="swatch-name">Accent 2</div><div class="swatch-hex">#c8001f</div><div class="swatch-role">Hover / brighter</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#722F37"></div>
  <div class="swatch-info"><div class="swatch-name">Sidebar</div><div class="swatch-hex">#722F37</div><div class="swatch-role">Wine / borravino</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#5a1f28"></div>
  <div class="swatch-info"><div class="swatch-name">Sidebar Active</div><div class="swatch-hex">#5a1f28</div><div class="swatch-role">Active nav item</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#6b7215"></div>
  <div class="swatch-info"><div class="swatch-name">Green</div><div class="swatch-hex">#6b7215</div><div class="swatch-role">Olive / success</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#b45309"></div>
  <div class="swatch-info"><div class="swatch-name">Yellow</div><div class="swatch-hex">#b45309</div><div class="swatch-role">Amber / warning</div></div>
</div>
<div class="swatch">
  <div class="swatch-block" style="background:#db473c"></div>
  <div class="swatch-info"><div class="swatch-name">Red</div><div class="swatch-hex">#db473c</div><div class="swatch-role">Danger / loss</div></div>
</div>
</body></html>
