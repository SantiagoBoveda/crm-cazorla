<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:16px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9e8e78;margin-bottom:6px}
.divider{border:none;border-top:1px solid #ebe4d8}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #dad0be;border-radius:12px;overflow:hidden}
th{background:#f0ebe0;padding:10px 16px;text-align:left;font-size:11px;color:#a7001d;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
td{padding:12px 16px;font-size:13px;border-top:1px solid #dad0be;color:#1a0f09}
tr:hover td{background:rgba(167,0,29,.04)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.mono{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#a7001d}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #dad0be;background:#fff;border-radius:12px 12px 0 0}
.table-header h3{font-size:14px;font-weight:600;color:#a7001d}
.actions{white-space:nowrap;text-align:right}
.btn-row{width:28px;height:28px;border-radius:6px;border:1px solid transparent;background:transparent;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
</style></head><body>

<div class="section-label">Data Table</div>
<div style="background:#fff;border:1px solid #dad0be;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(167,0,29,.06)">
  <div class="table-header">
    <h3>💰 Ventas recientes</h3>
    <button style="padding:6px 14px;border-radius:8px;border:1px solid rgba(107,114,21,.3);background:rgba(107,114,21,.1);color:#6b7215;font-size:12px;font-weight:600;cursor:pointer">⬇ Exportar</button>
  </div>
  <table>
    <thead><tr>
      <th>Cliente</th><th>Producto</th><th>País</th><th>Monto (USD)</th><th>Estado</th><th></th>
    </tr></thead>
    <tbody>
      <tr>
        <td style="font-weight:600;color:#a7001d">García &amp; Hijos SRL</td>
        <td>Aceituna Verde Comer.</td>
        <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:#6e5f4e">ARG</span></td>
        <td><span class="mono">$12,400</span></td>
        <td><span class="badge" style="background:rgba(16,185,129,.15);color:#6b7215">cobrada</span></td>
        <td class="actions"><button class="btn-row">✏️</button><button class="btn-row">🗑️</button></td>
      </tr>
      <tr>
        <td style="font-weight:600;color:#a7001d">Olivetti SpA</td>
        <td>Pasta de Tomate</td>
        <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:#6e5f4e">ITA</span></td>
        <td><span class="mono">$8,750</span></td>
        <td><span class="badge" style="background:rgba(167,0,29,.15);color:#a7001d">enviada</span></td>
        <td class="actions"><button class="btn-row">✏️</button><button class="btn-row">🗑️</button></td>
      </tr>
      <tr style="background:rgba(239,68,68,.03)">
        <td style="font-weight:600;color:#a7001d;border-left:2px solid #db473c">Mercado Central</td>
        <td>Aceituna Negra Natural</td>
        <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:#6e5f4e">CHI</span></td>
        <td><span class="mono" style="color:#db473c">$3,200</span></td>
        <td><span class="badge" style="background:rgba(239,68,68,.15);color:#db473c">vencida</span></td>
        <td class="actions"><button class="btn-row">✏️</button><button class="btn-row">🗑️</button></td>
      </tr>
    </tbody>
  </table>
</div>

</body></html>
