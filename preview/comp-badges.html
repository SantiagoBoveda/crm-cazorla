<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:14px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9e8e78;margin-bottom:6px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.divider{border:none;border-top:1px solid #ebe4d8}
.pill{padding:5px 14px;border-radius:20px;border:1px solid #dad0be;background:#f0ebe0;color:#5c4e3a;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer}
.pill.active{border-color:#b45309;background:rgba(180,83,9,.1);color:#b45309}
.state-pill{padding:5px 14px;border-radius:20px;border:1px solid #dad0be;background:#f0ebe0;color:#6e5f4e;font-size:12px;cursor:pointer}
.state-pill.active{border-color:#a7001d;background:rgba(167,0,29,.1);color:#a7001d}
.cumpl-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
</style></head><body>

<div>
  <div class="section-label">Status Badges</div>
  <div class="row">
    <span class="badge" style="background:rgba(16,185,129,.15);color:#6b7215">cobrada</span>
    <span class="badge" style="background:rgba(167,0,29,.15);color:#a7001d">enviada</span>
    <span class="badge" style="background:rgba(180,83,9,.12);color:#b45309">pendiente</span>
    <span class="badge" style="background:rgba(239,68,68,.15);color:#db473c">vencida</span>
    <span class="badge" style="background:rgba(100,116,139,.15);color:#6e5f4e">emitida</span>
    <span class="badge" style="background:rgba(100,116,139,.1);color:#9e8e78;text-decoration:line-through">anulada</span>
  </div>
</div>

<div class="divider"></div>
<div>
  <div class="section-label">Reclamos & Pipeline</div>
  <div class="row">
    <span class="badge" style="background:rgba(239,68,68,.15);color:#db473c">abierto</span>
    <span class="badge" style="background:rgba(245,158,11,.15);color:#b45309">en gestión</span>
    <span class="badge" style="background:rgba(16,185,129,.15);color:#6b7215">resuelto</span>
    <span class="badge" style="background:rgba(100,116,139,.15);color:#6e5f4e">cerrado</span>
    <span class="badge" style="background:rgba(167,0,29,.10);color:#c8001f">confirmada</span>
    <span class="badge" style="background:rgba(180,83,9,.12);color:#b45309">despachada</span>
  </div>
</div>

<div class="divider"></div>
<div>
  <div class="section-label">Urgency Dots</div>
  <div class="row">
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#5c4e3a"><span class="dot" style="background:#ff00aa;box-shadow:0 0 8px #ff00aa"></span>Crítica</span>
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#5c4e3a"><span class="dot" style="background:#db473c;box-shadow:0 0 6px #db473c"></span>Alta</span>
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#5c4e3a"><span class="dot" style="background:#b45309"></span>Media</span>
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#5c4e3a"><span class="dot" style="background:#6b7215"></span>Baja</span>
  </div>
</div>

<div class="divider"></div>
<div>
  <div class="section-label">Cumplimiento Badges</div>
  <div class="row">
    <span class="cumpl-badge" style="background:rgba(0,201,141,.15);color:#6b7215">98%</span>
    <span class="cumpl-badge" style="background:rgba(245,183,49,.15);color:#b45309">74%</span>
    <span class="cumpl-badge" style="background:rgba(242,87,87,.15);color:#db473c">42%</span>
    <span class="cumpl-badge" style="background:rgba(74,82,112,.2);color:#9e8e78">—</span>
  </div>
</div>

<div class="divider"></div>
<div>
  <div class="section-label">Filter Pills</div>
  <div class="row">
    <span class="state-pill active">Todos</span>
    <span class="state-pill">Abierto</span>
    <span class="state-pill">En gestión</span>
    <span class="state-pill">Resuelto</span>
    <span class="pill active">Nacional</span>
    <span class="pill">Internacional</span>
    <span class="pill">Almacén</span>
  </div>
</div>

</body></html>
