<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6e5f4e;margin-bottom:10px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:rgba(107,114,21,.13);color:#5a6012}
.badge-yellow{background:rgba(180,83,9,.12);color:#b45309}
.badge-red{background:rgba(219,71,60,.14);color:#c03828}
.badge-blue{background:rgba(167,0,29,.10);color:#c8001f}
.badge-muted{background:rgba(100,116,139,.15);color:#6e5f4e}
.badge-cobrada{background:rgba(16,185,129,.15);color:#6b7215}
.badge-vencida{background:rgba(239,68,68,.15);color:#db473c}
.badge-enviada{background:rgba(167,0,29,.15);color:#a7001d}
.badge-anulada{background:rgba(100,116,139,.1);color:#9e8e78;text-decoration:line-through}
.dot-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.dot-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#5c4e3a}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stripe{height:4px;border-radius:2px;width:100%;margin-bottom:4px}
.accent-bar{padding:14px 16px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.divider{border:none;border-top:1px solid #dad0be;margin:16px 0}
</style></head><body>

<div class="section-label">Status Badges — Invoices & Sales</div>
<div class="row">
  <span class="badge badge-cobrada">cobrada</span>
  <span class="badge badge-enviada">enviada</span>
  <span class="badge badge-yellow">pendiente</span>
  <span class="badge badge-vencida">vencida</span>
  <span class="badge badge-muted">emitida</span>
  <span class="badge badge-anulada">anulada</span>
</div>

<div class="section-label">Status Badges — Claims & Pipeline</div>
<div class="row">
  <span class="badge badge-red">abierto</span>
  <span class="badge badge-yellow">en gestión</span>
  <span class="badge badge-cobrada">resuelto</span>
  <span class="badge badge-muted">cerrado</span>
  <span class="badge badge-green">confirmada</span>
  <span class="badge badge-yellow">despachada</span>
</div>

<div class="divider"></div>
<div class="section-label">Urgency Dots</div>
<div class="dot-row">
  <div class="dot-item"><div class="dot" style="background:#ff00aa;box-shadow:0 0 8px #ff00aa"></div>Crítica</div>
  <div class="dot-item"><div class="dot" style="background:#db473c;box-shadow:0 0 6px #db473c"></div>Alta</div>
  <div class="dot-item"><div class="dot" style="background:#b45309"></div>Media</div>
  <div class="dot-item"><div class="dot" style="background:#6b7215"></div>Baja</div>
  <div class="dot-item"><div class="dot" style="background:#dad0be"></div>Sin datos</div>
</div>

<div class="divider"></div>
<div class="section-label">Pipeline Top Accent Bars</div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:500px">
  <div style="background:#fff;border:1px solid #dad0be;border-radius:8px;overflow:hidden">
    <div class="stripe" style="background:#94a3b8"></div>
    <div style="padding:8px;font-size:10px;color:#6e5f4e">Cotización</div>
  </div>
  <div style="background:#fff;border:1px solid #dad0be;border-radius:8px;overflow:hidden">
    <div class="stripe" style="background:#a7001d"></div>
    <div style="padding:8px;font-size:10px;color:#6e5f4e">Confirmada</div>
  </div>
  <div style="background:#fff;border:1px solid #dad0be;border-radius:8px;overflow:hidden">
    <div class="stripe" style="background:#b45309"></div>
    <div style="padding:8px;font-size:10px;color:#6e5f4e">Despachada</div>
  </div>
  <div style="background:#fff;border:1px solid #dad0be;border-radius:8px;overflow:hidden">
    <div class="stripe" style="background:#6b7215"></div>
    <div style="padding:8px;font-size:10px;color:#6e5f4e">Cobrada</div>
  </div>
  <div style="background:#fff;border:1px solid #dad0be;border-radius:8px;overflow:hidden">
    <div class="stripe" style="background:#db473c"></div>
    <div style="padding:8px;font-size:10px;color:#6e5f4e">Cancelada</div>
  </div>
</div>

</body></html>
