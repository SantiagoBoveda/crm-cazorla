<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e6;font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:16px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9e8e78;margin-bottom:8px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:600;transition:all .18s}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-primary{background:#a7001d;color:#fff}
.btn-outline{background:transparent;border:1px solid #dad0be;color:#1a0f09}
.btn-green{background:rgba(107,114,21,.12);border:1px solid rgba(107,114,21,.3);color:#6b7215}
.btn-yellow{background:rgba(180,83,9,.10);border:1px solid rgba(180,83,9,.3);color:#b45309}
.btn-red{background:rgba(219,71,60,.10);border:1px solid rgba(219,71,60,.3);color:#db473c}
.btn-dashed{background:transparent;border:1px dashed #c4b8a5;color:#9e8e78}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid #5a1f28;color:#e8b4bc;font-size:11px}
.divider{border:none;border-top:1px solid #ebe4d8}
</style></head><body>

<div>
  <div class="section-label">Primary & Outline</div>
  <div class="row">
    <button class="btn btn-primary">+ Nueva cotización</button>
    <button class="btn btn-outline">Exportar</button>
    <button class="btn btn-outline">☁ Sync</button>
    <button class="btn btn-primary btn-sm">＋ Agregar</button>
    <button class="btn btn-outline btn-sm">⚙️ Configurar</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="section-label">Colored Variants</div>
  <div class="row">
    <button class="btn btn-green">⬇ Exportar CSV</button>
    <button class="btn btn-yellow">＋ Nuevo proveedor</button>
    <button class="btn btn-red">🚨 Abrir reclamo</button>
    <button class="btn btn-dashed">＋ Agregar producto</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="section-label">Sidebar / Dark Surface</div>
  <div class="row" style="background:#722F37;padding:12px;border-radius:8px">
    <button class="btn btn-ghost">⬇ Export</button>
    <button class="btn btn-ghost">⬆ Import</button>
    <button class="btn" style="background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#16a34a;font-size:11px;padding:6px 12px">☁ Sync</button>
    <button class="btn" style="background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#16a34a;font-size:11px;padding:6px 12px">↗ Ver</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="section-label">Disabled State</div>
  <div class="row">
    <button class="btn btn-primary" style="opacity:.45;cursor:not-allowed">Exportando…</button>
    <button class="btn btn-green" style="opacity:.45;cursor:not-allowed">
      <div style="width:13px;height:13px;border:2px solid rgba(107,114,21,.3);border-top-color:#6b7215;border-radius:50%;animation:spin .7s linear infinite"></div>
      Cargando
    </button>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

</body></html>
