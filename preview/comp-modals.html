<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:rgba(44,13,28,.4);font-family:'Instrument Sans',sans-serif;padding:20px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.modal{background:#fff;border:1px solid #dad0be;border-radius:16px;padding:24px;width:340px;box-shadow:0 20px 60px rgba(44,13,28,.18)}
.modal h3{font-size:15px;font-weight:700;color:#a7001d;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#6e5f4e;margin-bottom:5px}
.input{width:100%;padding:9px 12px;background:#f0ebe0;border:1px solid #dad0be;border-radius:8px;color:#1a0f09;font-family:'Instrument Sans',sans-serif;font-size:13px;outline:none}
.input:focus{border-color:#a7001d}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Instrument Sans',sans-serif}
.btn-primary{background:#a7001d;color:#fff}
.btn-outline{background:transparent;border:1px solid #dad0be;color:#5c4e3a}
/* Small tooltip-style popover */
.tooltip{background:#fff;border:1px solid #c4b8a5;border-radius:14px;padding:18px;width:300px;box-shadow:0 16px 48px rgba(44,13,28,.18);position:relative}
.tooltip::before{content:'';position:absolute;top:-5px;left:16px;width:9px;height:9px;background:#fff;border-left:1px solid #c4b8a5;border-top:1px solid #c4b8a5;transform:rotate(45deg)}
.tt-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #dad0be}
.tt-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#a7001d,#c8001f);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.tt-name{font-size:13px;font-weight:700;color:#a7001d}
.tt-sub{font-size:11px;color:#6e5f4e}
.tt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tt-item{display:flex;flex-direction:column;gap:2px}
.tt-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#9e8e78;font-family:'DM Mono',monospace}
.tt-val{font-size:12px;color:#1a0f09;font-family:'DM Mono',monospace}
</style></head><body>

<div class="modal">
  <h3>Nueva Cotización</h3>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Cliente</label><input class="input" placeholder="Empresa…"></div>
    <div class="form-group"><label class="form-label">País</label><select class="input" style="appearance:none"><option>Argentina</option><option>Italia</option></select></div>
  </div>
  <div class="form-group"><label class="form-label">Producto</label><input class="input" value="Aceituna Verde Comercial"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Monto (USD)</label><input class="input" style="font-family:'DM Mono',monospace" value="12,400"></div>
    <div class="form-group"><label class="form-label">Incoterm</label><select class="input" style="appearance:none"><option>FOB</option><option>CIF</option></select></div>
  </div>
  <div class="form-group"><label class="form-label">Notas</label><textarea class="input" style="resize:none;min-height:56px" placeholder="Condiciones especiales…"></textarea></div>
  <div class="modal-actions">
    <button class="btn btn-outline">Cancelar</button>
    <button class="btn btn-primary">Guardar cotización</button>
  </div>
</div>

<div>
  <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9e8e78;margin-bottom:10px">Client Tooltip</div>
  <div class="tooltip">
    <div class="tt-header">
      <div class="tt-avatar">GH</div>
      <div><div class="tt-name">García &amp; Hijos SRL</div><div class="tt-sub">Buenos Aires · Argentina</div></div>
    </div>
    <div class="tt-grid">
      <div class="tt-item"><div class="tt-lbl">Última venta</div><div class="tt-val">2026-04-10</div></div>
      <div class="tt-item"><div class="tt-lbl">Total YTD</div><div class="tt-val" style="color:#6b7215">$48,200</div></div>
      <div class="tt-item"><div class="tt-lbl">Comercial</div><div class="tt-val">Santiago</div></div>
      <div class="tt-item"><div class="tt-lbl">Rubro</div><div class="tt-val" style="color:#a7001d">Aceitunas</div></div>
    </div>
  </div>
</div>

</body></html>
