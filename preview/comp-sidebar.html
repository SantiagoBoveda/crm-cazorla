<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#ebe4d8;font-family:'Instrument Sans',sans-serif;padding:0;display:flex;align-items:flex-start}
.sidebar{width:220px;background:#722F37;border-right:1px solid #5a1f28;display:flex;flex-direction:column;padding:0;height:500px;overflow:hidden}
.logo{height:70px;background:#722F37;border-bottom:1px solid #5a1f28;display:flex;align-items:center;padding:0 16px;gap:10px;position:relative;overflow:hidden}
.logo-img{height:38px;object-fit:contain;filter:brightness(0) invert(1);opacity:.9}
.logo::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(30,4,10,.45));pointer-events:none}
.search-wrap{padding:8px 12px 4px;position:relative}
.search-input{width:100%;padding:7px 10px 7px 28px;background:#5a1f28;border:1px solid #5a1f28;border-radius:8px;color:#fff;font-size:12px;outline:none;font-family:'Instrument Sans',sans-serif}
.search-input::placeholder{color:#e8b4bc}
.search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .2s;font-size:13px;color:#e8b4bc;border-left:3px solid transparent}
.nav-item:hover{background:#5a1f28;color:#fff}
.nav-item.active{background:#5a1f28;color:#fff;border-left-color:#db473c}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid #5a1f28}
.user-chip{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#a7001d,#c8001f);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{color:#fff;font-weight:600;font-size:12px}
.user-sub{font-size:10px;color:#e8b4bc}
.theme-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;margin:0 12px 8px;border-radius:8px;border:1px solid #5a1f28;background:#5a1f28;cursor:pointer;font-size:11px;color:#e8b4bc}
.theme-track{width:28px;height:15px;border-radius:8px;background:#5a1f28;border:1px solid rgba(255,255,255,.2);position:relative;flex-shrink:0}
.theme-thumb{width:11px;height:11px;border-radius:50%;background:#fff;position:absolute;top:1px;left:2px}
</style></head><body>
<div class="sidebar">
  <div class="logo">
    <img class="logo-img" src="../assets/logo_cazorla_white.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div style="display:none;color:#f8ccc0;font-size:15px;font-weight:700;z-index:1">Cazorla CRM</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" placeholder="Buscar…">
  </div>
  <div class="nav-item active"><span class="icon">📊</span><span>Dashboard</span></div>
  <div class="nav-item"><span class="icon">👥</span><span>Clientes</span></div>
  <div class="nav-item"><span class="icon">📝</span><span>Cotizaciones</span></div>
  <div class="nav-item"><span class="icon">🔀</span><span>Pipeline</span></div>
  <div class="nav-item"><span class="icon">📦</span><span>Inventario</span></div>
  <div class="nav-item"><span class="icon">💰</span><span>Ventas</span></div>
  <div class="nav-item"><span class="icon">📈</span><span>Previsión</span></div>
  <div class="nav-item"><span class="icon">🧾</span><span>Facturación</span></div>
  <div class="nav-item"><span class="icon">🚨</span><span>Reclamos</span></div>
  <div class="theme-toggle">
    <div class="theme-track"><div class="theme-thumb"></div></div>
    <span>Modo oscuro</span>
  </div>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar">SB</div>
      <div><div class="user-name">Santiago B.</div><div class="user-sub">Conectado · Google</div></div>
    </div>
  </div>
</div>
</body></html>
